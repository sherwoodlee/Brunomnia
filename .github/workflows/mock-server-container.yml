name: Mock server container

on:
  pull_request:
    paths:
      - .github/workflows/mock-server-container.yml
      - .dockerignore
      - Dockerfile.mock
      - examples/mock-deployment.json
      - mock-server/**
      - package-lock.json
      - package.json
      - scripts/mock-server-smoke.mjs
      - src/lib/mockDeployment.test.ts
      - src/lib/mockDeployment.ts
      - src-tauri/src/mock_deployment.rs
      - src-tauri/src/mock_faker.rs
      - src-tauri/src/mock_server.rs
      - src-tauri/src/models.rs
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - .github/workflows/mock-server-container.yml
      - .dockerignore
      - Dockerfile.mock
      - examples/mock-deployment.json
      - mock-server/**
      - package-lock.json
      - package.json
      - scripts/mock-server-smoke.mjs
      - src/lib/mockDeployment.test.ts
      - src/lib/mockDeployment.ts
      - src-tauri/src/mock_deployment.rs
      - src-tauri/src/mock_faker.rs
      - src-tauri/src/mock_server.rs
      - src-tauri/src/models.rs
  workflow_dispatch:

concurrency:
  group: mock-server-container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/sherwoodlee/brunomnia-mock-server

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5c # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run src/lib/mockDeployment.test.ts
      - run: cargo fmt --manifest-path mock-server/Cargo.toml --check
      - run: cargo test --manifest-path mock-server/Cargo.toml --locked
      - run: cargo clippy --manifest-path mock-server/Cargo.toml --all-targets --locked -- -D warnings
      - run: cargo build --manifest-path mock-server/Cargo.toml --locked
      - run: node scripts/mock-server-smoke.mjs mock-server/target/debug/brunomnia-mock-server
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build verification image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.mock
          load: true
          tags: brunomnia-mock-server:verification
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
      - name: Smoke image
        run: |
          container=$(docker run --detach --rm --read-only --cap-drop ALL --security-opt no-new-privileges --name brunomnia-mock-verification --publish 127.0.0.1:18080:8080 --volume "$PWD/examples/mock-deployment.json:/config/mock.json:ro" brunomnia-mock-server:verification)
          trap 'docker stop "$container" >/dev/null 2>&1 || true' EXIT
          test "$(docker inspect --format '{{.Config.User}}' "$container")" = "65532:65532"
          for attempt in $(seq 1 50); do
            body=$(curl --silent --fail 'http://127.0.0.1:18080/orders/7' || true)
            test "$body" = '{"id":"7","role":"guest"}' && break
            sleep 0.2
          done
          test "$body" = '{"id":"7","role":"guest"}'

  publish:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5c # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.mock
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Sign published digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
