name: Desktop bundles

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - .github/workflows/desktop-release.yml
      - package-lock.json
      - package.json
      - scripts/create-tauri-release-config.mjs
      - scripts/create-tauri-release-config.test.ts
      - scripts/desktop-artifact-manifest.mjs
      - scripts/desktop-artifact-manifest.test.ts
      - scripts/updater-manifest.mjs
      - scripts/updater-manifest.test.ts
      - scripts/windows-sign.ps1
      - src/**
      - src-tauri/**

concurrency:
  group: desktop-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-15
            bundles: app,dmg
            attestationPaths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-x64
            runner: windows-2022
            bundles: nsis,msi
            attestationPaths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - platform: linux-x64
            runner: ubuntu-22.04
            bundles: appimage,deb,rpm
            attestationPaths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
    env:
      CARGO_INCREMENTAL: 0
      CI: true
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Install Linux bundle prerequisites
        if: matrix.platform == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev rpm
      - run: npm ci
      - name: Build desktop installers
        run: npm run tauri build -- --ci --no-sign --bundles "${{ matrix.bundles }}"
      - name: Create checksum manifest
        shell: bash
        run: node scripts/desktop-artifact-manifest.mjs --root src-tauri/target/release/bundle --platform "${{ matrix.platform }}" --revision "$GITHUB_SHA"
      - name: Attest desktop installers
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: ${{ matrix.attestationPaths }}
      - name: Upload desktop installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: brunomnia-${{ matrix.platform }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/brunomnia-desktop-${{ matrix.platform }}.manifest.json
            src-tauri/target/release/bundle/SHA256SUMS-${{ matrix.platform }}.txt

  trusted-release-build:
    if: startsWith(github.ref, 'refs/tags/v')
    name: trusted-${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-universal
            runner: macos-15
            buildArgs: --target universal-apple-darwin --bundles app,dmg
            bundleRoot: src-tauri/target/universal-apple-darwin/release/bundle
            attestationPaths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform: windows-x64
            runner: windows-2022
            buildArgs: --bundles nsis,msi
            bundleRoot: src-tauri/target/release/bundle
            attestationPaths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.zip
              src-tauri/target/release/bundle/msi/*.msi
          - platform: linux-x64
            runner: ubuntu-22.04
            buildArgs: --bundles appimage,deb,rpm
            bundleRoot: src-tauri/target/release/bundle
            attestationPaths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
    env:
      CARGO_INCREMENTAL: 0
      CI: true
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Validate release tag and signing credentials
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DIGICERT_SM_HOST: ${{ vars.DIGICERT_SM_HOST }}
          DIGICERT_SM_API_KEY: ${{ secrets.DIGICERT_SM_API_KEY }}
          DIGICERT_SM_CLIENT_CERT_BASE64: ${{ secrets.DIGICERT_SM_CLIENT_CERT_BASE64 }}
          DIGICERT_SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_SM_CLIENT_CERT_PASSWORD }}
          DIGICERT_KEYPAIR_ALIAS: ${{ secrets.DIGICERT_KEYPAIR_ALIAS }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          node -e 'if (!/^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(process.argv[1])) process.exit(1)' "$version"
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            test -n "$APPLE_CERTIFICATE_BASE64"
            test -n "$APPLE_CERTIFICATE_PASSWORD"
            test -n "$APPLE_ID"
            test -n "$APPLE_APP_SPECIFIC_PASSWORD"
            test -n "$APPLE_SIGNING_IDENTITY"
            test -n "$APPLE_TEAM_ID"
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            test -n "$DIGICERT_SM_HOST"
            test -n "$DIGICERT_SM_API_KEY"
            test -n "$DIGICERT_SM_CLIENT_CERT_BASE64"
            test -n "$DIGICERT_SM_CLIENT_CERT_PASSWORD"
            test -n "$DIGICERT_KEYPAIR_ALIAS"
          fi
          echo "BRUNOMNIA_VERSION=$version" >> "$GITHUB_ENV"
      - name: Install Linux bundle prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev rpm
      - name: Install universal macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - run: npm ci
      - name: Create release build configuration
        shell: bash
        run: |
          config="$RUNNER_TEMP/brunomnia-tauri-release.json"
          node scripts/create-tauri-release-config.mjs --version "$BRUNOMNIA_VERSION" --output "$config"
          echo "TAURI_RELEASE_CONFIG=$config" >> "$GITHUB_ENV"
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          certificate="$RUNNER_TEMP/brunomnia-release.p12"
          keychain="$RUNNER_TEMP/brunomnia-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          echo "APPLE_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
      - name: Configure DigiCert client certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DIGICERT_SM_CLIENT_CERT_BASE64: ${{ secrets.DIGICERT_SM_CLIENT_CERT_BASE64 }}
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP 'brunomnia-digicert.p12'
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:DIGICERT_SM_CLIENT_CERT_BASE64))
          "SM_CLIENT_CERT_FILE=$certificate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Setup DigiCert Software Trust Manager
        if: runner.os == 'Windows'
        uses: digicert/code-signing-software-trust-action@fae23a455ba4bde62b64fd7cb2f81ade788f5a95
        with:
          simple-signing-mode: true
        env:
          SM_HOST: ${{ vars.DIGICERT_SM_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_SM_API_KEY }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_SM_CLIENT_CERT_PASSWORD }}
      - name: Build signed desktop installers and updater archives
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SM_HOST: ${{ vars.DIGICERT_SM_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_SM_API_KEY }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ secrets.DIGICERT_KEYPAIR_ALIAS }}
        run: npm run tauri build -- --ci --config "$TAURI_RELEASE_CONFIG" ${{ matrix.buildArgs }}
      - name: Verify Apple signatures and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app="$(find '${{ matrix.bundleRoot }}/macos' -maxdepth 1 -name '*.app' -type d -print -quit)"
          dmg="$(find '${{ matrix.bundleRoot }}/dmg' -maxdepth 1 -name '*.dmg' -type f -print -quit)"
          test -n "$app"
          test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
      - name: Verify Windows Authenticode signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem '${{ matrix.bundleRoot }}' -Recurse -File | Where-Object { $_.Extension -in @('.exe', '.msi') }
          if ($files.Count -eq 0) { throw 'No Windows installers were produced.' }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne 'Valid') { throw "Invalid Authenticode signature for $($file.FullName): $($signature.Status)" }
          }
      - name: Create checksum manifest
        shell: bash
        run: node scripts/desktop-artifact-manifest.mjs --root "${{ matrix.bundleRoot }}" --platform "${{ matrix.platform }}" --revision "$GITHUB_SHA" --app-version "$BRUNOMNIA_VERSION"
      - name: Attest signed desktop installers and updater archives
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: ${{ matrix.attestationPaths }}
      - name: Upload trusted desktop release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: brunomnia-trusted-${{ matrix.platform }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
          path: |
            ${{ matrix.bundleRoot }}/appimage/*.AppImage
            ${{ matrix.bundleRoot }}/appimage/*.AppImage.tar.gz
            ${{ matrix.bundleRoot }}/appimage/*.AppImage.tar.gz.sig
            ${{ matrix.bundleRoot }}/deb/*.deb
            ${{ matrix.bundleRoot }}/dmg/*.dmg
            ${{ matrix.bundleRoot }}/macos/*.app.tar.gz
            ${{ matrix.bundleRoot }}/macos/*.app.tar.gz.sig
            ${{ matrix.bundleRoot }}/nsis/*.exe
            ${{ matrix.bundleRoot }}/nsis/*.exe.zip
            ${{ matrix.bundleRoot }}/nsis/*.exe.zip.sig
            ${{ matrix.bundleRoot }}/msi/*.msi
            ${{ matrix.bundleRoot }}/rpm/*.rpm
            ${{ matrix.bundleRoot }}/brunomnia-desktop-${{ matrix.platform }}.manifest.json
            ${{ matrix.bundleRoot }}/SHA256SUMS-${{ matrix.platform }}.txt
      - name: Remove signing credentials
        if: always()
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" && -n "${APPLE_KEYCHAIN:-}" ]]; then security delete-keychain "$APPLE_KEYCHAIN" || true; fi
          rm -f "$RUNNER_TEMP/brunomnia-release.p12" "$RUNNER_TEMP/brunomnia-digicert.p12"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: trusted-release-build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          pattern: brunomnia-trusted-*
          merge-multiple: true
          path: desktop-dist
      - name: Create signed updater manifest
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          channel=stable
          if [[ "$version" == *-* ]]; then channel=beta; fi
          notes="Signed Brunomnia $version desktop release. See the tagged release for complete notes and checksums."
          BRUNOMNIA_RELEASE_NOTES="$notes" node scripts/updater-manifest.mjs \
            --root desktop-dist \
            --output desktop-dist/latest.json \
            --version "$version" \
            --channel "$channel" \
            --repository "$GITHUB_REPOSITORY" \
            --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "BRUNOMNIA_UPDATE_CHANNEL=$channel" >> "$GITHUB_ENV"
      - name: Publish tagged and rolling-channel releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find desktop-dist -type f -print0)
          test "${#files[@]}" -gt 0
          release_flags=()
          if [[ "$BRUNOMNIA_UPDATE_CHANNEL" == "beta" ]]; then release_flags+=(--prerelease); fi
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes "${release_flags[@]}" "${files[@]}"
          rolling_tag="updater-$BRUNOMNIA_UPDATE_CHANNEL"
          if ! gh release view "$rolling_tag" >/dev/null 2>&1; then
            gh release create "$rolling_tag" --target "$GITHUB_SHA" --title "Brunomnia $BRUNOMNIA_UPDATE_CHANNEL updates" --notes "Rolling signed updater assets. Install versioned releases from the main Releases page."
          fi
          mapfile -d '' updater_files < <(find desktop-dist -type f \( -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name '*.AppImage.tar.gz' -o -name '*.AppImage.tar.gz.sig' -o -name '*.exe.zip' -o -name '*.exe.zip.sig' \) -print0)
          test "${#updater_files[@]}" -eq 6
          gh release upload "$rolling_tag" --clobber desktop-dist/latest.json "${updater_files[@]}"
