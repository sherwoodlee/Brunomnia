name: Desktop bundles

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - .github/workflows/desktop-release.yml
      - package-lock.json
      - package.json
      - scripts/desktop-artifact-manifest.mjs
      - src/**
      - src-tauri/**

concurrency:
  group: desktop-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-15
            bundles: app,dmg
          - platform: windows-x64
            runner: windows-2022
            bundles: nsis,msi
          - platform: linux-x64
            runner: ubuntu-22.04
            bundles: appimage,deb,rpm
    env:
      CARGO_INCREMENTAL: 0
      CI: true
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Install Linux bundle prerequisites
        if: matrix.platform == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev rpm
      - run: npm ci
      - name: Build desktop installers
        run: npm run tauri build -- --ci --no-sign --bundles "${{ matrix.bundles }}"
      - name: Create checksum manifest
        shell: bash
        run: node scripts/desktop-artifact-manifest.mjs --root src-tauri/target/release/bundle --platform "${{ matrix.platform }}" --revision "$GITHUB_SHA"
      - name: Attest desktop installers
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-checksums: src-tauri/target/release/bundle/SHA256SUMS-${{ matrix.platform }}.txt
      - name: Upload desktop installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: brunomnia-${{ matrix.platform }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/brunomnia-desktop-${{ matrix.platform }}.manifest.json
            src-tauri/target/release/bundle/SHA256SUMS-${{ matrix.platform }}.txt

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          pattern: brunomnia-*
          merge-multiple: true
          path: desktop-dist
      - name: Publish tagged desktop installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find desktop-dist -type f -print0)
          test "${{#files[@]}}" -gt 0
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes "${{files[@]}}"
