name: CLI container

on:
  pull_request:
    paths:
      - .github/workflows/cli-container.yml
      - .dockerignore
      - Dockerfile.cli
      - bin/brunomnia.cjs
      - cli/**
      - package-lock.json
      - package.json
      - scripts/cli-container-smoke.mjs
      - src/**
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: cli-container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/sherwoodlee/brunomnia-cli

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5c # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:cli
      - name: Verify committed CLI bundle
        run: git diff --exit-code -- bin/brunomnia.cjs
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build verification image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.cli
          load: true
          tags: brunomnia-cli:verification
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
      - name: Smoke image
        run: |
          test "$(docker run --rm brunomnia-cli:verification --version)" = "$(node -p "require('./package.json').version")"
          docker run --rm --network none --volume "$PWD/examples:/workspace:ro" brunomnia-cli:verification run test "CLI Health" --workingDir /workspace/cli-workspace.json --ci --allow-scripts --reporter min

  publish:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5c # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Sign published digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
